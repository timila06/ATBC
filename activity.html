<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity | ATBC</title>
    <link rel="stylesheet" href="styles.css?v=20260725" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <header class="site-header scrolled" id="siteHeader">
      <a class="brand" href="index.html"><span class="brand-name">Australia Thailand Business Council</span></a>
      <button class="menu-toggle" id="menuToggle" type="button" aria-label="Open navigation"><span></span><span></span><span></span></button>
      <nav class="main-nav" id="mainNav">
        <a href="index.html">Home</a><a href="about.html">About Us</a><a href="memberships.html">Memberships</a><a href="sponsors.html">Sponsor</a><a href="mission.html">Mission</a><a href="promotion.html">Promotion</a><a href="board-members.html">Board Members</a><a href="activity.html" class="is-active">Activity</a><a href="login.html">Login</a><a href="contact.html" class="nav-cta">Contact</a>
      </nav>
    </header>
    <main class="page-main">
      <section class="page-hero"><div class="section-inner"><p class="eyebrow">Activity & Updates</p><h1>Recent council activity.</h1><p>Browse recent briefings, events, delegations, and updates from newest to oldest.</p></div></section>
      <section class="content-page-block">
        <div class="section-inner">
          <div class="activity-slider-shell"><button class="slider-btn" id="activityPrev" type="button">&lsaquo;</button><div class="activity-slider" id="activitySlider"></div><button class="slider-btn" id="activityNext" type="button">&rsaquo;</button></div>
          <div class="activity-feed" id="activityList"></div>
          <div class="activity-form-card role-president-only">
            <h3>Post activity update</h3>
            <form id="activityForm">
              <div class="form-group"><label for="activity-title">Activity title</label><input id="activity-title" name="title" required /></div>
              <div class="form-group"><label for="activity-date">Date</label><input id="activity-date" name="date" type="date" required /></div>
              <div class="form-group"><label for="activity-category">Category</label><select id="activity-category" name="category"><option>Event</option><option>Briefing</option><option>News</option><option>Delegation</option><option>Announcement</option></select></div>
              <div class="form-group"><label for="activity-image">Image URL</label><input id="activity-image" name="image" type="url" placeholder="https://..." /></div>
              <div class="form-group"><label for="activity-link">Related link</label><input id="activity-link" name="link" type="url" placeholder="https://..." /></div>
              <div class="form-group"><label for="activity-summary">Short summary</label><textarea id="activity-summary" name="summary" required></textarea></div>
              <div class="form-group"><label for="activity-details">Additional details</label><textarea id="activity-details" name="details"></textarea></div>
              <button class="btn btn-primary" type="submit">Post activity</button>
            </form>
          </div>
        </div>
      </section>
    </main>
    <div class="toast" id="toast"><span class="toast-icon">✓</span><span id="toastMsg">Updated.</span></div>
    <script src="supabase-config.js?v=20260725"></script><script src="script.js?v=20260725"></script>
  </body>
</html>
